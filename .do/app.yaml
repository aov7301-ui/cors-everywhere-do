# DigitalOcean App Platform — deploy dari GitHub atau doctl
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: cors-everywhere
region: sgp

services:
  - name: cors
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: YOUR_GITHUB_USER/cors-everywhere-do
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
    routes:
      - path: /
